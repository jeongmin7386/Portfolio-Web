server:
  port: ${PORT:8080}

spring:
  application:
    name: portfolio-publisher
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/portfolio}}
    username: ${DB_USERNAME:portfolio}
    password: ${DB_PASSWORD:portfolio}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  frontend-origin-patterns: ${FRONTEND_ORIGIN_PATTERNS:}
  jwt:
    secret: ${JWT_SECRET:replace-this-secret-with-a-long-random-value-for-production}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:120}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
    public-path: /uploads
