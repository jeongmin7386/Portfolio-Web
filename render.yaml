services:
  - type: web
    name: portfolio-web-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-web-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: 120
      - key: FRONTEND_ORIGIN_PATTERNS
        value: https://*.onrender.com
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: web
    name: portfolio-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: portfolio-web-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: portfolio-web-db
    plan: free
    region: singapore
