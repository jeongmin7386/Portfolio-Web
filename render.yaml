services:
  - type: web
    name: portfolio-web-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-web-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: 120
      - key: FRONTEND_ORIGIN_PATTERNS
        value: https://*.onrender.com
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: web
    name: portfolio-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: portfolio-web-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: studio-archive
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-web-db
          property: connectionString
      - key: STUDIO_ARCHIVE_ADMIN_PASSWORD
        sync: false
      - key: STUDIO_ARCHIVE_AUTH_SECRET
        generateValue: true
      - key: STUDIO_ARCHIVE_UPLOAD_DIR
        value: /tmp/studio-archive-uploads

databases:
  - name: portfolio-web-db
    plan: free
    region: singapore
